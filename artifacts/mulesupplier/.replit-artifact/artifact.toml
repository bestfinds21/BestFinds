kind = "web"
previewPath = "/"
title = "Mulesupplier"
version = "1.0.0"
id = "artifacts/mulesupplier"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25881

[services.development]
run = "pnpm --filter @workspace/mulesupplier run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mulesupplier", "run", "build" ]
publicDir = "artifacts/mulesupplier/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25881"
BASE_PATH = "/"
